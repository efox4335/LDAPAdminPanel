services:
  openLdap:
    image: bitnami/openldap:latest
    environment:
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=password
      - LDAP_ADMIN_DN=cn=admin
    ports:
      - 1389:1389
      - 1636:1636
  tlsOnlyLdap:
    image: bitnami/openldap:latest
    volumes:
      - ./../../tools/testTlsFiles:/ldapTlsFiles/:ro
    environment:
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=password
      - LDAP_ADMIN_DN=cn=admin
      - LDAP_ENABLE_TLS=yes
      - LDAP_REQUIRE_TLS=yes
      - LDAP_TLS_CERT_FILE=/ldapTlsFiles/ldapTlsCert.pem
      - LDAP_TLS_KEY_FILE=/ldapTlsFiles/ldapTlsKey.pem
      - LDAP_TLS_CA_FILE=/ldapTlsFiles/testCaCert.pem

    ports:
      - 1391:1389
      - 1638:1636
